name: Limpar outputs antigos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  limpar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apagar pasta de outputs
        run: |
          rm -rf output_tutorial_3
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Limpar outputs antigos"
          git push
